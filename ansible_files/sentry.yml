---
- name: Install Self-Hosted Sentry on RHEL 9
  hosts: sentry
  become: true

  vars_files:
    - group_vars/all.yml

  tasks:

    #################################################
    # SYSTEM PREPARATION
    #################################################

    - name: Update system packages
      dnf:
        name: "*"
        state: latest
        update_cache: yes

    - name: Install required packages
      dnf:
        name: "{{ required_packages }}"
        state: present

    #################################################
    # DOCKER INSTALLATION
    #################################################

    - name: Add Docker repository
      shell: |
        dnf config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo
      args:
        creates: /etc/yum.repos.d/docker-ce.repo

    - name: Install Docker packages
      dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Create docker daemon config directory
      file:
        path: /etc/docker
        state: directory
        mode: '0755'

    - name: Configure docker daemon
      template:
        src: docker-daemon.json
        dest: /etc/docker/daemon.json
        mode: '0644'

    - name: Enable and start docker
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Add users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop: "{{ docker_users }}"

    #################################################
    # SYSTEM TUNING
    #################################################

    - name: Configure vm.max_map_count
      sysctl:
        name: vm.max_map_count
        value: "262144"
        state: present
        reload: yes

    - name: Configure fs.file-max
      sysctl:
        name: fs.file-max
        value: "2097152"
        state: present
        reload: yes

    #################################################
    # CREATE DIRECTORIES
    #################################################

    - name: Create Sentry directory
      file:
        path: "{{ sentry_install_dir }}"
        state: directory
        mode: '0755'

    #################################################
    # CLONE SENTRY
    #################################################

    - name: Clone Sentry self-hosted repository
      git:
        repo: https://github.com/getsentry/self-hosted.git
        dest: "{{ sentry_install_dir }}"
        version: "{{ sentry_version }}"
        force: yes

    #################################################
    # INSTALL SENTRY
    #################################################

    - name: Run Sentry install script
      shell: |
        ./install.sh --skip-user-creation
      args:
        chdir: "{{ sentry_install_dir }}"
      environment:
        COMPOSE_HTTP_TIMEOUT: "240"
      register: sentry_install
      changed_when: "'Creating volumes' in sentry_install.stdout"

    #################################################
    # START SENTRY
    #################################################

    - name: Start Sentry containers
      shell: docker compose up -d
      args:
        chdir: "{{ sentry_install_dir }}"

    #################################################
    # CREATE ADMIN USER
    #################################################

    - name: Create Sentry admin user
      shell: |
        docker compose run --rm web createuser \
        --superuser \
        --email {{ sentry_admin_email }} \
        --password {{ sentry_admin_pass }}
      args:
        chdir: "{{ sentry_install_dir }}"
      ignore_errors: true

    #################################################
    # NGINX REVERSE PROXY
    #################################################

    - name: Install nginx
      dnf:
        name: nginx
        state: present
      when: enable_nginx

    - name: Deploy nginx reverse proxy config
      template:
        src: sentry-nginx.conf
        dest: /etc/nginx/conf.d/sentry.conf
      when: enable_nginx

    - name: Remove default nginx config
      file:
        path: /etc/nginx/conf.d/default.conf
        state: absent
      when: enable_nginx

    - name: Test nginx config
      shell: nginx -t
      when: enable_nginx

    - name: Enable and start nginx
      systemd:
        name: nginx
        enabled: yes
        state: restarted
      when: enable_nginx

    #################################################
    # VERIFY
    #################################################

    - name: Verify docker containers
      shell: docker ps
      register: docker_ps

    - debug:
        var: docker_ps.stdout_lines
